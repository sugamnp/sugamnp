<svg fill="none" viewBox="0 0 800 200" width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Space-themed background -->
  <defs>
    <radialGradient id="spaceGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </radialGradient>
  </defs>
  <rect width="800" height="200" fill="url(#spaceGrad)"/>

  <!-- Floating stars / cosmic particles -->
  <circle cx="50" cy="50" r="2" fill="#fde68a" opacity="0.8">
    <animate attributeName="cy" values="50;150;50" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="50;700;50" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="30" r="3" fill="#facc15" opacity="0.6">
    <animateMotion dur="7s" repeatCount="indefinite" path="M0,0 C50,50 150,50 200,0"/>
  </circle>
  <circle cx="600" cy="120" r="2.5" fill="#fffacd" opacity="0.5">
    <animateMotion dur="10s" repeatCount="indefinite" path="M0,0 C-60,-40 -150,-40 -200,0"/>
  </circle>
  <circle cx="400" cy="60" r="3" fill="#fde68a" opacity="0.7">
    <animateMotion dur="8s" repeatCount="indefinite" path="M0,0 C30,20 100,20 130,0"/>
  </circle>
  <circle cx="700" cy="40" r="1.5" fill="#fff" opacity="0.4">
    <animateMotion dur="12s" repeatCount="indefinite" path="M0,0 C-40,30 -100,30 -120,0"/>
  </circle>

  <!-- Main content -->
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .container {
          font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 200px;
          text-align: center;
          color: white;
          position: relative;
          z-index: 1;
        }

        h1 {
          font-size: 50px;
          margin: 0;
          background: linear-gradient(90deg, #38bdf8, #818cf8);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
        }

        .changing-text {
          font-size: 24px;
          font-weight: 300;
          margin-top: 10px;
          height: 30px;
          overflow: hidden;
        }

        .word-wrapper {
          display: block;
          animation: spin 9s infinite cubic-bezier(0.65, 0, 0.35, 1);
        }

        .word {
          display: block;
          height: 30px;
          line-height: 30px;
          color: #94a3b8;
        }

        @keyframes spin {
          0%, 25% { transform: translateY(0); }
          33%, 58% { transform: translateY(-30px); }
          66%, 91% { transform: translateY(-60px); }
          100% { transform: translateY(0); }
        }
      </style>
      <div class="container">
        <h1>सुगम (Sugam)</h1>
        <div class="changing-text">
          <div class="word-wrapper">
            <span class="word">Software Engineer</span>
            <span class="word">Problem Solver</span>
            <span class="word">Creative Thinker</span>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
