<svg fill="none" viewBox="0 0 800 200" width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Space-themed background -->
  <defs>
    <radialGradient id="spaceGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </radialGradient>
  </defs>
  <rect width="800" height="200" fill="url(#spaceGrad)"/>

  <!-- Floating emojis as stars/tech -->
  <text x="50" y="50" font-size="20">⭐</text>
  <animate attributeName="x" values="50;700;50" dur="8s" repeatCount="indefinite" />
  <animate attributeName="y" values="50;150;50" dur="6s" repeatCount="indefinite" />

  <text x="200" y="30" font-size="18">🌌</text>
  <animateMotion dur="7s" repeatCount="indefinite" path="M0,0 C50,50 150,50 200,0"/>

  <text x="600" y="120" font-size="16">💻</text>
  <animateMotion dur="10s" repeatCount="indefinite" path="M0,0 C-60,-40 -150,-40 -200,0"/>

  <text x="400" y="60" font-size="20">⚡</text>
  <animateMotion dur="8s" repeatCount="indefinite" path="M0,0 C30,20 100,20 130,0"/>

  <text x="700" y="40" font-size="14">⭐</text>
  <animateMotion dur="12s" repeatCount="indefinite" path="M0,0 C-40,30 -100,30 -120,0"/>

  <!-- Main content -->
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .container {
          font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 200px;
          text-align: center;
          color: white;
          position: relative;
          z-index: 1;
        }

        h1 {
          font-size: 50px;
          margin: 0;
          background: linear-gradient(90deg, #38bdf8, #818cf8);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
        }

        .changing-text {
          font-size: 24px;
          font-weight: 300;
          margin-top: 10px;
          height: 30px;
          overflow: hidden;
        }

        .word-wrapper {
          display: block;
          animation: spin 9s infinite cubic-bezier(0.65, 0, 0.35, 1);
        }

        .word {
          display: block;
          height: 30px;
          line-height: 30px;
          color: #94a3b8;
        }

        @keyframes spin {
          0%, 25% { transform: translateY(0); }
          33%, 58% { transform: translateY(-30px); }
          66%, 91% { transform: translateY(-60px); }
          100% { transform: translateY(0); }
        }
      </style>
      <div class="container">
        <h1>सुगम (Sugam)</h1>
        <div class="changing-text">
          <div class="word-wrapper">
            <span class="word">Software Engineer</span>
            <span class="word">Problem Solver</span>
            <span class="word">Creative Thinker</span>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
