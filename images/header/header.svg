<svg fill="none" viewBox="0 0 800 200" width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Uniform dark background -->
  <rect width="800" height="200" fill="#0f172a"/>

  <!-- Thicker corner swirls fully offscreen at start/end -->
  <defs>
    <linearGradient id="gradTL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fcd34d" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fcd34d" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fcd34d" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gradTR" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fb923c" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gradBL" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#fcd34d" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fcd34d" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#fcd34d" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gradBR" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fb923c" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Top-left swirl -->
  <path d="M-50,-50 C100,-20 60,100 200,-30" stroke="url(#gradTL)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Top-right swirl -->
  <path d="M850,-50 C700,-20 740,100 600,-30" stroke="url(#gradTR)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Bottom-left swirl -->
  <path d="M-50,250 C100,220 60,80 200,230" stroke="url(#gradBL)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Bottom-right swirl -->
  <path d="M850,250 C700,220 740,80 600,230" stroke="url(#gradBR)" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- Main content -->
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .container {
          font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 200px;
          text-align: center;
          color: white;
          position: relative;
          z-index: 1;
        }

        h1 {
          font-size: 50px;
          margin: 0;
          background: linear-gradient(90deg, #38bdf8, #818cf8);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
        }

        .changing-text {
          font-size: 24px;
          font-weight: 300;
          margin-top: 10px;
          height: 30px;
          overflow: hidden;
        }

        .word-wrapper {
          display: block;
          animation: spin 9s infinite cubic-bezier(0.65, 0, 0.35, 1);
        }

        .word {
          display: block;
          height: 30px;
          line-height: 30px;
          color: #94a3b8;
        }

        @keyframes spin {
          0%, 25% { transform: translateY(0); }
          33%, 58% { transform: translateY(-30px); }
          66%, 91% { transform: translateY(-60px); }
          100% { transform: translateY(0); }
        }
      </style>
      <div class="container">
        <h1>सुगम (Sugam)</h1>
        <div class="changing-text">
          <div class="word-wrapper">
            <span class="word">Software Engineer</span>
            <span class="word">Problem Solver</span>
            <span class="word">Creative Thinker</span>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
